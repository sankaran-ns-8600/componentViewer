<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="-apple-system, 'Segoe UI', Inter, Roboto, sans-serif">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Decorative blurred blobs -->
  <circle cx="1080" cy="120" r="180" fill="#22d3ee" opacity="0.18" filter="url(#soft)"/>
  <circle cx="160" cy="540" r="200" fill="#6366f1" opacity="0.22" filter="url(#soft)"/>

  <!-- Accent bar -->
  <rect x="80" y="92" width="64" height="6" rx="3" fill="url(#accent)"/>

  <!-- Eyebrow -->
  <text x="80" y="80" fill="#94a3b8" font-size="20" font-weight="600" letter-spacing="4">JQUERY · OPEN SOURCE · v1.0</text>

  <!-- Title -->
  <text x="80" y="180" fill="#f8fafc" font-size="78" font-weight="800" letter-spacing="-1">Component</text>
  <text x="80" y="262" font-size="78" font-weight="800" letter-spacing="-1" fill="url(#accent)">Viewer</text>

  <!-- Tagline -->
  <text x="80" y="320" fill="#cbd5e1" font-size="26" font-weight="500">A modular full-screen attachment previewer.</text>
  <text x="80" y="356" fill="#94a3b8" font-size="22" font-weight="400">Images · Video · Audio · PDF · Code · Markdown · HTML</text>

  <!-- Feature pills -->
  <g font-size="18" font-weight="600" fill="#e2e8f0">
    <g transform="translate(80,410)">
      <rect width="138" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="69" y="28" text-anchor="middle">Zoom &amp; Pan</text>
    </g>
    <g transform="translate(230,410)">
      <rect width="118" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="59" y="28" text-anchor="middle">Carousel</text>
    </g>
    <g transform="translate(360,410)">
      <rect width="128" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="64" y="28" text-anchor="middle">Slideshow</text>
    </g>
    <g transform="translate(500,410)">
      <rect width="174" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="87" y="28" text-anchor="middle">Keyboard Nav</text>
    </g>
    <g transform="translate(686,410)">
      <rect width="180" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="90" y="28" text-anchor="middle">OCR Extraction</text>
    </g>
  </g>

  <!-- Author / install -->
  <text x="80" y="558" fill="#94a3b8" font-size="20" font-weight="500">npm i @sankaran-8600/component-viewer</text>
  <text x="80" y="592" fill="#64748b" font-size="18">github.com/sankaran-ns-8600 · by Sankaran Natarajan</text>

  <!-- Right-side mock UI: layered preview window -->
  <g transform="translate(740,140)">
    <!-- Glow behind -->
    <rect x="-20" y="-10" width="500" height="360" rx="24" fill="url(#glow)"/>

    <!-- Window -->
    <rect x="0" y="0" width="460" height="320" rx="18" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="460" height="36" rx="18" fill="#111c33"/>
    <rect x="0" y="18" width="460" height="18" fill="#111c33"/>
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e"/>
    <text x="230" y="23" text-anchor="middle" fill="#94a3b8" font-size="13">component-viewer · preview.png</text>

    <!-- "Image" preview area -->
    <rect x="16" y="52" width="428" height="200" rx="10" fill="#0f172a" stroke="#1f2a44"/>
    <!-- mock mountains/sun -->
    <circle cx="370" cy="120" r="22" fill="#fbbf24" opacity="0.9"/>
    <polygon points="40,250 150,130 230,200 290,150 410,250" fill="#1e3a8a" opacity="0.85"/>
    <polygon points="120,250 220,160 320,250" fill="#3b82f6" opacity="0.7"/>

    <!-- Toolbar -->
    <g transform="translate(16,266)">
      <rect width="428" height="40" rx="10" fill="#111c33" stroke="#1f2a44"/>
      <g fill="#cbd5e1" font-size="13" font-weight="600">
        <rect x="10" y="8" width="60" height="24" rx="6" fill="#1e293b"/>
        <text x="40" y="25" text-anchor="middle">- 100% +</text>

        <rect x="80" y="8" width="58" height="24" rx="6" fill="#1e293b"/>
        <text x="109" y="25" text-anchor="middle">Rotate</text>

        <rect x="148" y="8" width="64" height="24" rx="6" fill="#1e293b"/>
        <text x="180" y="25" text-anchor="middle">Download</text>

        <rect x="222" y="8" width="46" height="24" rx="6" fill="#1e293b"/>
        <text x="245" y="25" text-anchor="middle">OCR</text>

        <rect x="358" y="8" width="60" height="24" rx="6" fill="url(#accent)"/>
        <text x="388" y="25" text-anchor="middle" fill="#0b1224">Share</text>
      </g>
    </g>

    <!-- Stacked card hint behind -->
    <rect x="14" y="-14" width="460" height="320" rx="18" fill="none" stroke="#334155" stroke-opacity="0.5" transform="translate(-10,-6)"/>
  </g>
</svg>
